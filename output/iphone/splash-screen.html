<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebServer SYNC Splash</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background: linear-gradient(145deg, #0b1220, #1e293b); color: #e2e8f0; display: grid; place-items: center; height: 100vh; }
    .wrap { text-align: center; padding: 20px; }
    img { width: min(220px, 60vw); margin-bottom: 16px; }
    h1 { margin: 0 0 8px; }
    p { margin: 0; color: #94a3b8; }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="./logo.svg" alt="WebServer SYNC logo" />
    <h1>WebServer SYNC 1.5.0</h1>
    <p>iPhone/iPad API App Splash Screen</p>
  </main>
</body>
</html>
